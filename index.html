<!DOCTYPE html>
<html>
<head>
<title>For Rithika ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
text-align:center;
color:white;
overflow:auto;
}

.container{
margin-top:60px;
padding:20px;
}

h1{
font-size:60px;
}

#typing{
font-size:24px;
margin-top:15px;
height:50px;
}

/* slideshow */

.slideshow img{
width:260px;
border-radius:20px;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* buttons */

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:40px;
cursor:pointer;
margin:15px;
}

#yes{
background:white;
color:#ff4d6d;
}

#no{
background:#333;
color:white;
position:absolute;
}

/* celebration */

#proposal{
font-size:32px;
margin-top:30px;
display:none;
}

/* floating hearts */

.heart{
position:absolute;
font-size:24px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-1000px);opacity:0;}
}

/* roses */

.rose{
position:absolute;
font-size:20px;
animation:fall 7s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px);opacity:1;}
100%{transform:translateY(1000px);opacity:0;}
}

</style>

</head>

<body>

<div class="container">

<h1>Hi Rithu ❤️</h1>

<div id="typing"></div>

<h3 id="loveDays"></h3>

<div class="slideshow">
<img id="slide" src="rithu1.jpeg">
</div>

<h2 style="margin-top:30px;">Will you be my Pondati ? 💖</h2>

<button id="yes" onclick="yesClicked()">YES ❤️</button>
<button id="no" onmouseover="moveNo()">NO 😅</button>

<div id="proposal">
🎆 Rithika you just made me the happiest person alive ❤️
</div>

</div>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

/* typing animation */

const text="Rithika, meeting you was the most beautiful accident of my life. I made this website because you are very special to me ❤️";

let i=0;

function typing(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,50);
}
}

typing();

/* slideshow */

const images=[
"rithu1.jpeg",
"rithu2.jpeg",
"rithu3.jpeg",
];

let slideIndex=0;

function changeSlide(){

slideIndex++;

if(slideIndex>=images.length){
slideIndex=0;
}

document.getElementById("slide").src=images[slideIndex];

}

setInterval(changeSlide,3000);

/* love days counter */

const loveStart=new Date("2015-12-05");

const today=new Date();

const diffTime=Math.abs(today-loveStart);

const diffDays=Math.ceil(diffTime/(1000*60*60*24));

document.getElementById("loveDays").innerHTML="I have been loving you for "+diffDays+" days ❤️";

/* yes click */

function yesClicked(){

document.getElementById("proposal").style.display="block";

for(let i=0;i<80;i++){
createHeart();
createRose();
}

}

/* running no */

function moveNo(){

const button=document.getElementById("no");

const x=Math.random()*window.innerWidth;

const y=Math.random()*window.innerHeight;

button.style.left=x+"px";

button.style.top=y+"px";

}

/* hearts */

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,400);

/* roses */

function createRose(){

const rose=document.createElement("div");

rose.classList.add("rose");

rose.innerHTML="🌹";

rose.style.left=Math.random()*100+"vw";

document.body.appendChild(rose);

setTimeout(()=>{
rose.remove();
},7000);

}

setInterval(createRose,800);

</script>

</body>
</html>
